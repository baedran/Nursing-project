<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>No connection — Caregivers Collective</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, sans-serif;
        background: #f7f7f3;
        color: #1f2a35;
      }
      .card {
        text-align: center;
        padding: 2rem;
        max-width: 22rem;
      }
      h1 {
        font-size: 1.25rem;
        margin: 1rem 0 0.5rem;
        color: #1a504f;
      }
      p {
        color: #454e58;
        line-height: 1.5;
      }
      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #4ec19a;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="dot"></span>
      <h1>No connection</h1>
      <p>
        You're offline. Reconnect to Wi-Fi or mobile data to document a visit,
        then reopen the app.
      </p>
    </div>
  </body>
</html>
